---
# Create the demo-db Secret locally before applying this manifest.
# See README.md for the kubectl command and required keys.
apiVersion: v1
kind: Service
metadata:
  name: demo-db
spec:
  ports:
    - port: 5432
  selector:
    app: demo-db

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-db
  labels:
    app: demo-db
spec:
  selector:
    matchLabels:
      app: demo-db
  template:
    metadata:
      labels:
        app: demo-db
      annotations:
        petclinic.spring.io/run-as-non-root-exception: "postgres entrypoint needs root to initialize the mounted data directory"
        petclinic.spring.io/read-only-root-filesystem-exception: "postgres entrypoint writes runtime files outside the data volume"
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - image: postgres:18.3
          name: postgresql
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - DAC_OVERRIDE
                - FOWNER
                - SETGID
                - SETUID
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: demo-db
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: demo-db
                  key: password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: demo-db
                  key: database
          ports:
            - containerPort: 5432
              name: postgresql
          livenessProbe:
            tcpSocket:
              port: postgresql
          readinessProbe:
            tcpSocket:
              port: postgresql
          startupProbe:
            tcpSocket:
              port: postgresql
          volumeMounts:
            - mountPath: /var/lib/postgresql
              name: postgres-data
            - mountPath: /tmp
              name: tmp
      volumes:
        - name: postgres-data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
