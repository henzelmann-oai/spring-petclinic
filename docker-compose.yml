services:
  mysql:
    image: mysql:9.6
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${PETCLINIC_MYSQL_ROOT_PASSWORD:?Set PETCLINIC_MYSQL_ROOT_PASSWORD in your shell or .env file}
      - MYSQL_USER=${PETCLINIC_MYSQL_USER:?Set PETCLINIC_MYSQL_USER in your shell or .env file}
      - MYSQL_PASSWORD=${PETCLINIC_MYSQL_PASSWORD:?Set PETCLINIC_MYSQL_PASSWORD in your shell or .env file}
      - MYSQL_DATABASE=${PETCLINIC_MYSQL_DATABASE:-petclinic}
    volumes:
      - "./conf.d:/etc/mysql/conf.d:ro"
  postgres:
    image: postgres:18.3
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${PETCLINIC_POSTGRES_USER:?Set PETCLINIC_POSTGRES_USER in your shell or .env file}
      - POSTGRES_PASSWORD=${PETCLINIC_POSTGRES_PASSWORD:?Set PETCLINIC_POSTGRES_PASSWORD in your shell or .env file}
      - POSTGRES_DB=${PETCLINIC_POSTGRES_DB:-petclinic}
